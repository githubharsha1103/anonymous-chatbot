<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu - Anonymous Chat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #17212b;
            --bg-secondary: #242f3d;
            --text-color: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-color: #6ab04c;
            --danger-color: #eb4d4b;
            --warning-color: #f0932b;
            --info-color: #22a6b3;
            --card-bg: #1e2a38;
            --border-color: #2c3e50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .menu-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 80px;
        }

        .menu-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .menu-btn .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .menu-btn .label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
            text-align: center;
        }

        .menu-btn.admin-btn {
            background-color: rgba(235, 77, 75, 0.15);
            border-color: rgba(235, 77, 75, 0.3);
        }

        .menu-btn.admin-btn .label {
            color: var(--danger-color);
        }

        .admin-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* Loading state */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hidden by default */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="spinner"></div>
    </div>

    <div id="menu-content" class="hidden">
        <div class="header">
            <h1>📋 Menu</h1>
            <p>Anonymous Chat Dashboard</p>
        </div>

        <!-- User Menu -->
        <div class="section">
            <div class="section-title">Main Menu</div>
            <div class="menu-grid">
                <button class="menu-btn" data-action="chat">
                    <span class="icon">💬</span>
                    <span class="label">Chat</span>
                </button>
                <button class="menu-btn" data-action="settings">
                    <span class="icon">⚙️</span>
                    <span class="label">Settings</span>
                </button>
                <button class="menu-btn" data-action="premium">
                    <span class="icon">💎</span>
                    <span class="label">Premium</span>
                </button>
                <button class="menu-btn" data-action="help">
                    <span class="icon">❓</span>
                    <span class="label">Help</span>
                </button>
                <button class="menu-btn" data-action="about" style="grid-column: span 2;">
                    <span class="icon">ℹ️</span>
                    <span class="label">About</span>
                </button>
            </div>
        </div>

        <!-- Admin Menu (only visible to admins) -->
        <div id="admin-menu" class="section admin-section hidden">
            <div class="section-title">Admin Menu</div>
            <div class="menu-grid">
                <button class="menu-btn admin-btn" data-action="admin_broadcast">
                    <span class="icon">📢</span>
                    <span class="label">Broadcast</span>
                </button>
                <button class="menu-btn admin-btn" data-action="admin_stats">
                    <span class="icon">📊</span>
                    <span class="label">Stats</span>
                </button>
                <button class="menu-btn admin-btn" data-action="admin_reports">
                    <span class="icon">🚨</span>
                    <span class="label">Reports</span>
                </button>
                <button class="menu-btn admin-btn" data-action="admin_panel">
                    <span class="icon">🛠️</span>
                    <span class="label">Admin Panel</span>
                </button>
            </div>
        </div>

        <div class="footer">
            <p>Version 1.0.0</p>
            <p>Anonymous Chat Bot</p>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        const webApp = Telegram.WebApp;
        
        // Expand the WebApp to full height
        webApp.expand();
        
        // Apply Telegram theme colors
        webApp.ready();
        
        // Get theme colors from Telegram
        const themeParams = webApp.themeParams;
        if (themeParams) {
            document.documentElement.style.setProperty('--bg-color', themeParams.bg_color || '#17212b');
            document.documentElement.style.setProperty('--text-color', themeParams.text_color || '#ffffff');
            document.documentElement.style.setProperty('--accent-color', themeParams.button_color || '#6ab04c');
        }

        // Check admin status
        async function checkAdminStatus() {
            try {
                const response = await fetch('/api/check-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: webApp.initDataUnsafe?.user?.id
                    })
                });
                const data = await response.json();
                return data.isAdmin;
            } catch (error) {
                console.error('Error checking admin status:', error);
                return false;
            }
        }

        // Initialize menu
        async function initMenu() {
            // Show content
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('menu-content').classList.remove('hidden');

            // Check if user is admin
            const isAdmin = await checkAdminStatus();
            if (isAdmin) {
                document.getElementById('admin-menu').classList.remove('hidden');
            }

            // Add click handlers to all menu buttons
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const action = btn.dataset.action;
                    if (action) {
                        webApp.sendData(action);
                        // Close the WebApp after sending data
                        setTimeout(() => {
                            webApp.close();
                        }, 100);
                    }
                });
            });
        }

        // Start initialization
        initMenu();
    </script>
</body>
</html>
